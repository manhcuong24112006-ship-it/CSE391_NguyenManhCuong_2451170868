<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Product Page</title>
    <link rel="stylesheet" href="responsive.css">
</head>

<body>

<header>
    <div class="logo">ShopTLU</div>

    <input type="checkbox" id="menu-toggle">

    <label for="menu-toggle" class="menu-icon">☰</label>

    <nav>
        <a href="#">Home</a>
        <a href="#">Products</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
    </nav>
</header>

<div class="layout">

    <aside class="sidebar">
        <h3>Bộ lọc</h3>

        <label><input type="checkbox"> Apple</label>
        <label><input type="checkbox"> Samsung</label>
        <label><input type="checkbox"> Xiaomi</label>
        <label><input type="checkbox"> Laptop</label>
    </aside>

    <main class="products">

        <div class="card">
            <img src="https://placehold.co/300x200" alt="">
            <h3>iPhone 16</h3>
            <p>25.990.000đ</p>
        </div>

        <div class="card">
            <img src="https://placehold.co/300x200" alt="">
            <h3>MacBook Pro</h3>
            <p>45.990.000đ</p>
        </div>

        <div class="card">
            <img src="https://placehold.co/300x200" alt="">
            <h3>Galaxy S25</h3>
            <p>24.990.000đ</p>
        </div>

        <div class="card">
            <img src="https://placehold.co/300x200" alt="">
            <h3>iPad Air</h3>
            <p>18.990.000đ</p>
        </div>

        <div class="card">
            <img src="https://placehold.co/300x200" alt="">
            <h3>AirPods Pro</h3>
            <p>5.990.000đ</p>
        </div>

        <div class="card">
            <img src="https://placehold.co/300x200" alt="">
            <h3>Apple Watch</h3>
            <p>9.990.000đ</p>
        </div>

        <div class="card">
            <img src="https://placehold.co/300x200" alt="">
            <h3>Gaming Laptop</h3>
            <p>39.990.000đ</p>
        </div>

        <div class="card">
            <img src="https://placehold.co/300x200" alt="">
            <h3>Camera Sony</h3>
            <p>29.990.000đ</p>
        </div>

    </main>

    <aside class="ads">
        <img src="https://placehold.co/200x600" alt="">
    </aside>

</div>

<footer>
    <p>© 2026 ShopTLU</p>
</footer>

</body>
</html>
