<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Layout</title>
    <link rel="stylesheet" href="grid.css">
</head>

<body>

<div class="container">

    <header>
        <h1>ShopTLU</h1>
    </header>

    <section class="hero">
        <div class="hero-card">
            <h2>Sản phẩm nổi bật</h2>
            <p>Giảm giá đến 36%</p>
        </div>

        <div class="hero-banner">
            <img src="https://placehold.co/800x250" alt="">
        </div>
    </section>

    <aside class="sidebar">
        <h3>Bộ lọc</h3>

        <label><input type="checkbox"> Apple</label>
        <label><input type="checkbox"> Samsung</label>
        <label><input type="checkbox"> Xiaomi</label>
        <label><input type="checkbox"> Laptop</label>
    </aside>

    <main class="products">

        <div class="card">
            <img src="https://placehold.co/300x200" alt="">
            <h3>iPhone 16</h3>
            <p>25.990.000đ</p>
        </div>

        <div class="card">
            <img src="https://placehold.co/300x200" alt="">
            <h3>MacBook Pro</h3>
            <p>45.990.000đ</p>
        </div>

        <div class="card">
            <img src="https://placehold.co/300x200" alt="">
            <h3>Galaxy S25</h3>
            <p>24.990.000đ</p>
        </div>

        <div class="card">
            <img src="https://placehold.co/300x200" alt="">
            <h3>iPad Air</h3>
            <p>18.990.000đ</p>
        </div>

        <div class="card">
            <img src="https://placehold.co/300x200" alt="">
            <h3>AirPods Pro</h3>
            <p>5.990.000đ</p>
        </div>

        <div class="card">
            <img src="https://placehold.co/300x200" alt="">
            <h3>Apple Watch</h3>
            <p>9.990.000đ</p>
        </div>

    </main>

    <aside class="ads">
        <img src="https://placehold.co/180x600" alt="">
    </aside>

    <footer>
        <p>© 2026 ShopTLU</p>
    </footer>

</div>

</body>
</html>
