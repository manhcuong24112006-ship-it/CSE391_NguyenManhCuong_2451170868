<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Positioning Playground</title>
    <link rel="stylesheet" href="positioning.css">
</head>

<body>

<header>
    <div class="logo">ShopTLU</div>

    <nav>
        <a href="#">Home</a>
        <a href="#">Products</a>
        <a href="#">Contact</a>
    </nav>
</header>

<main class="layout">

    <aside class="sidebar">
        <h2>Danh mục</h2>
        <ul>
            <li>Điện thoại</li>
            <li>Laptop</li>
            <li>Phụ kiện Điện Tử</li>
        </ul>
    </aside>

    <section class="content">

        <article class="product-card">
            <span class="badge">HOT</span>

            <img src="https://placehold.co/300x200" alt="product">

            <h2>iPhone 16 Pro</h2>

            <p>Flagship mới nhất của Apple.</p>
        </article>

        <article class="product-card">
            <span class="badge">HOT</span>

            <img src="https://placehold.co/300x200" alt="product">

            <h2>MacBook Pro</h2>

            <p>Laptop hiệu năng cao cho developer.</p>
        </article>

    </section>

</main>

<a href="#" class="scroll-top">↑</a>

</body>
</html>
