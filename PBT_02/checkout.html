<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout</title>
</head>
<body>

<h1>Đặt hàng</h1>


<table border="1">
    <thead>
        <tr>
            <th>STT</th>
            <th>Sản phẩm</th>
            <th>Đơn giá</th>
            <th>Số lượng</th>
            <th>Thành tiền</th>
        </tr>
    </thead>
    <tbody>
        <tr>
            <td>1</td>
            <td>iPhone 16</td>
            <td>25.000.000đ</td>
            <td>1</td>
            <td>25.000.000đ</td>
        </tr>
        <tr>
            <td>2</td>
            <td>Samsung S24</td>
            <td>22.000.000đ</td>
            <td>1</td>
            <td>22.000.000đ</td>
        </tr>
        <tr>
            <td>3</td>
            <td>Xiaomi 14</td>
            <td>15.000.000đ</td>
            <td>1</td>
            <td>15.000.000đ</td>
        </tr>
    </tbody>
    <tfoot>
        <tr>
            <td colspan="4">Tổng cộng</td>
            <td>62.000.000đ</td>
        </tr>
    </tfoot>
</table>


<label for="search">Tìm sản phẩm:</label>
<input list="products" id="search" placeholder="Nhập tên sản phẩm">
<datalist id="products">
    <option value="iPhone 16">
    <option value="Samsung S24">
    <option value="Xiaomi 14">
</datalist>

<form action="#" method="POST">


<fieldset>
    <legend>Thanh toán</legend>

    <p>Phương thức:</p>
    <label><input type="radio" name="payment" required> COD</label>
    <label><input type="radio" name="payment"> Chuyển khoản</label>
    <label><input type="radio" name="payment"> Ví điện tử</label>

    <label for="coupon">Mã giảm giá:</label>
    <input type="text" id="coupon" name="coupon" pattern="SALE[0-9]{4}" placeholder="SALE2026">

    <label for="note">Ghi chú:</label>
    <textarea id="note" name="note" rows="3" placeholder="Nhập ghi chú..."></textarea>
</fieldset>


<fieldset>
    <legend>Thông tin giao hàng</legend>

    <label for="date">Ngày giao:</label>
    <input type="date" id="date" name="date" min="2026-04-26">

    <label for="time">Khung giờ:</label>
    <select id="time" name="time">
        <option>Sáng (8-12h)</option>
        <option>Chiều (14-18h)</option>
        <option>Tối (18-21h)</option>
    </select>

    <label for="range">Thời gian (ngày):</label>
    <input type="range" id="range" name="range" min="1" max="7" step="1">
</fieldset>


<p>Tổng tiền: <output>62.000.000đ</output></p>

<label>Điểm tích lũy:</label>
<meter value="70" min="0" max="100"></meter>


<button type="submit" aria-label="Xác nhận đặt hàng">Đặt hàng</button>

</form>

</body>
</html>
