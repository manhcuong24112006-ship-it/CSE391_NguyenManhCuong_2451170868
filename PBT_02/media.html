<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multimedia sản phẩm</title>
</head>
<body>

<h1>Giới thiệu sản phẩm</h1>


<figure>
    <img src="https://placehold.co/300x200" alt="iPhone 16 Pro Max màu titan" loading="lazy" style="max-width:100%; height:auto;">
    <figcaption>iPhone 16 Pro Max — 25.990.000đ</figcaption>
</figure>

<figure>
    <img src="https://placehold.co/300x200" alt="Samsung S24 màu đen" loading="lazy" style="max-width:100%; height:auto;">
    <figcaption>Samsung S24 — 22.000.000đ</figcaption>
</figure>

<figure>
    <img src="https://placehold.co/300x200" alt="Xiaomi 14 màu trắng" loading="lazy" style="max-width:100%; height:auto;">
    <figcaption>Xiaomi 14 — 15.000.000đ</figcaption>
</figure>


<h2>Video giới thiệu</h2>
<iframe width="560" height="315" 
src="https://www.youtube.com/embed/dQw4w9WgXcQ" 
title="YouTube video" 
frameborder="0" 
allowfullscreen>
</iframe>


<h2>Video sản phẩm</h2>
<video controls poster="https://placehold.co/300x200" style="max-width:100%;">
    <source src="video.mp4" type="video/mp4">
    <source src="video.webm" type="video/webm">
    Trình duyệt không hỗ trợ video
</video>


<h2>Nhạc nền</h2>
<audio controls>
    <source src="audio.mp3" type="audio/mpeg">
    Trình duyệt không hỗ trợ audio
</audio>


<h2>Logo</h2>
<svg width="100" height="100">
    <circle cx="50" cy="50" r="40" fill="blue"></circle>
</svg>

</body>
</html>
